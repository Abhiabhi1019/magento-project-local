server {
    listen 80;
    server_name localhost;

    # ── Magento root ────────────────────────────────────────────────────────
    set $MAGE_ROOT /var/www/html;
    root $MAGE_ROOT/pub;
    index index.php;

    # ── Upload / timeout settings ───────────────────────────────────────────
    client_max_body_size 100M;
    client_body_timeout  300;
    send_timeout         300;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/magento_access.log;
    error_log  /var/log/nginx/magento_error.log warn;

    # ── Health check endpoint (used by Docker healthcheck) ──────────────────
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Static files ─────────────────────────────────────────────────────────
    location /static/ {
        # Serve pre-deployed static files; fall back to PHP for versioned assets
        location ~ ^/static/version\d*/ {
            rewrite ^/static/version\d*/(.*)$ /static/$1 last;
        }
        alias $MAGE_ROOT/pub/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires max;
        try_files $uri $uri/ =404;
    }

    # ── Media files ──────────────────────────────────────────────────────────
    location /media/ {
        alias $MAGE_ROOT/pub/media/;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
        try_files $uri $uri/ /get.php?$args;
    }

    # ── Magento front controller ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP-FPM pass-through ─────────────────────────────────────────────────
    location ~ ^/(index|get|static|errors/report|errors/404|errors/503|print)\.php$ {
        include        fastcgi_params;
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  HTTPS            off;

        # Forward real client IP for Magento logging / rate limiting
        fastcgi_param  HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
        fastcgi_param  HTTP_X_FORWARDED_PROTO $scheme;

        fastcgi_buffers        16  16k;
        fastcgi_buffer_size        32k;
        fastcgi_read_timeout       600;
        fastcgi_connect_timeout    600;
    }

    # ── Deny access to PHP files outside the entry points ────────────────────
    location ~* ^.+\.php$ {
        deny all;
    }

    # ── Cache static assets aggressively ────────────────────────────────────
    location ~* \.(jpg|jpeg|gif|png|webp|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        add_header Cache-Control "public, max-age=31536000";
    }

    # ── Block common attack vectors ──────────────────────────────────────────
    location ~* (\.git|composer\.json|auth\.json|\.env) {
        deny all;
    }
}
