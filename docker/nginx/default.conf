
upstream fastcgi_backend {
    server php:9000;
}

# --- SSL Termination Proxy (Frontend) ---
server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/magento.crt;
    ssl_certificate_key /etc/nginx/certs/magento.key;

    location / {
        # Docker DNS resolver
        resolver 127.0.0.11 valid=30s;
        set $upstream_varnish http://varnish:80;
        
        proxy_pass $upstream_varnish;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Health check for docker
    location = /health {
        access_log off;
        return 200 "OK\n";
    }
}

# --- Magento Application Server (Backend) ---
server {
    listen 8080;
    server_name localhost;
    set $MAGE_ROOT /var/www/html;
    root $MAGE_ROOT/pub;
    index index.php;

    client_max_body_size 100M;

    location /static/ {
        location ~ ^/static/version\d*/ {
            rewrite ^/static/version\d*/(.*)$ /static/$1 last;
        }
        alias $MAGE_ROOT/pub/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires max;
        try_files $uri $uri/ =404;
    }

    location /media/ {
        alias $MAGE_ROOT/pub/media/;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
        try_files $uri $uri/ /get.php?$args;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ ^/(index|get|static|errors/report|errors/404|errors/503|print)\.php$ {
        include        fastcgi_params;
        fastcgi_pass   fastcgi_backend;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  HTTPS            on;

        fastcgi_buffers        16  16k;
        fastcgi_buffer_size        32k;
        fastcgi_read_timeout       600;
        fastcgi_connect_timeout    600;
    }

    location ~* ^.+\.php$ {
        deny all;
    }

    location ~* \.(jpg|jpeg|gif|png|webp|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        add_header Cache-Control "public, max-age=31536000";
    }

    location ~* (\.git|composer\.json|auth\.json|\.env) {
        deny all;
    }
}
