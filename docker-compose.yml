services:

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./magento:/var/www/html
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - php
    restart: always

  php:
    build: ./docker/php
    volumes:
      - ./magento:/var/www/html
    depends_on:
      - db
      - redis
      - opensearch
    restart: always

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: magento
    ports:
      - "3307:3306"
    restart: always

  redis:
    image: redis:latest
    restart: always

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9202:9200"
    restart: always
